# Live HTTP checks against Binance / CoinDCX public APIs.
# Does not run on every PR to avoid flakes and rate limits for contributors.

name: Integration

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: read

jobs:
  live-apis:
    name: Live provider smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: Run integration tests
        run: pytest tests/bandl/ -m integration --override-ini="addopts="
